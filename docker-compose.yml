x-aws-env: &aws-env
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test
  AWS_DEFAULT_REGION: us-east-1
  AWS_ENDPOINT_URL: http://localstack:4566

x-container-env: &container-env
  NETWORK: "mlops-lab_mlops-lab-net"

x-airflow-env: &airflow-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__CORE__LOAD_EXAMPLES: "False"
  AIRFLOW__CORE__DAGBAG_IMPORT_TIMEOUT: 30
  AIRFLOW__CORE__PARALLELISM: 1
  AIRFLOW__CORE__MAX_ACTIVE_RUNS_PER_DAG: 1
  AIRFLOW__CORE__LAZY_LOAD_PROVIDERS: "True"
  AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-webserver:8080/execution/
  AIRFLOW__API_AUTH__JWT_SECRET: "OpN6nUDy6b+Wa4QF6TPQsMcVxltHBV8PC8FvofpWLMM="
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-db:5432/airflow
  AIRFLOW__API_SERVER__SECRET_KEY: "your-super-secret-key-change-me"
  AIRFLOW__API_AUTH__BACKEND: airflow.api_auth.backend.basic_auth
  PYTHONWARNINGS: "ignore::SyntaxWarning"

x-airflow-volumes: &airflow-volumes
  - ./app/airflow/dags:/opt/airflow/dags
  - ./app:/workspace
  - /var/run/docker.sock:/var/run/docker.sock
  - ./config/airflow/passwords.json:/opt/airflow/passwords.json
  - airflow_logs:/opt/airflow/logs

x-resources-micro: &resources-micro
  deploy:
    resources:
      limits:
        memory: 128M
        cpus: "0.20"
      reservations:
        memory: 32M
        cpus: "0.05"

# Tight cap for always-on infra/UI tools that are mostly idle
x-resources-small: &resources-small
  deploy:
    resources:
      limits:
        memory: 256M
        cpus: "0.25"
      reservations:
        memory: 64M
        cpus: "0.05"

# Medium for supporting services with occasional bursts
x-resources-medium: &resources-medium
  deploy:
    resources:
      limits:
        memory: 512M
        cpus: "0.50"
      reservations:
        memory: 128M
        cpus: "0.10"

# Generous for services that run actual workloads
x-resources-large: &resources-large
  deploy:
    resources:
      limits:
        memory: 768M
        cpus: "0.75"
      reservations:
        memory: 256M
        cpus: "0.25"

x-resources-xlarge: &resources-xlarge
  deploy:
    resources:
      limits:
        memory: 2G
        cpus: "1.5"
      reservations:
        memory: 256M
        cpus: "0.25"

services:
  jupyter:
    <<: *resources-xlarge # needs headroom for data processing
    build:
      context: .
      dockerfile: Dockerfile.jupyter
    container_name: jupyter
    ports:
      - "8888:8888"
    volumes:
      - ./app:/app
      - uv_cache:/root/.cache/uv
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp:/tmp # for sagemaker[local] usage
    environment:
      <<: [*aws-env, *container-env]
      JUPYTER_TOKEN: ""
      JUPYTER_ENABLE_LAB: "yes"
      # DOCKER_BUILDKIT: 1
    command: >
      jupyter-lab
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --allow-root
      --notebook-dir=/app
    networks:
      - mlops-lab-net
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8888/api || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    labels:
      - "promtail_enabled=true"

  localstack:
    <<: *resources-medium # spikes on lambda/s3 ops but mostly idle
    image: localstack/localstack:4
    container_name: localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,sqs,sns,dynamodb,lambda,iam,cloudwatch,ec2,kinesis,secretsmanager,ssm,stepfunctions,eventbridge,apigateway,logs
      - DEBUG=1
      - DOCKER_HOST=unix:///var/run/docker.sock
      - LOCALSTACK_HOST=localstack
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - "./config/localstack/init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh"
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - mlops-lab-net
    labels:
      - "promtail_enabled=true"

  postgres-db:
    <<: *resources-medium # already tuned via postgres flags, cap above that
    image: postgres:18-alpine3.22
    container_name: postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      # docker exec postgres-db psql -U postgres -c "SHOW data_directory;"
      PGDATA: /var/lib/postgresql/18/docker
    ports:
      - "5432:5432"
    volumes:
      # docker exec postgres-db psql -U postgres -c "SHOW data_directory;"
      - postgres_pgdata:/var/lib/postgresql/18/docker
      - ./config/postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    networks:
      - mlops-lab-net
    command: >
      postgres
      -c shared_buffers=256MB
      -c work_mem=16MB
      -c maintenance_work_mem=128MB
      -c effective_cache_size=768MB
      -c max_connections=200
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    labels:
      - "promtail_enabled=true"

  adminer:
    <<: *resources-small # pure PHP UI, barely uses anything
    image: adminer:5.4.1
    container_name: adminer
    ports:
      - "8082:8080"
    networks:
      - mlops-lab-net
    environment:
      - ADMINER_DEFAULT_SERVER=postgres-db
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "promtail_enabled=true"

  mlflow:
    <<: *resources-large # tracking server is mostly I/O bound
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    container_name: mlflow
    depends_on:
      postgres-db:
        condition: service_healthy # waits for pg_isready, not just container start
    ports:
      - "5000:5000"
    environment:
      <<: *aws-env
      MLFLOW_TRACKING_URI: postgresql://mlflow:mlflow@postgres-db:5432/mlflow
      MLFLOW_S3_ENDPOINT_URL: http://localstack:4566
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --workers 1
      --backend-store-uri postgresql://mlflow:mlflow@postgres-db:5432/mlflow
      --artifacts-destination s3://mlflow-artifacts
      --allowed-hosts "*"
    networks:
      - mlops-lab-net
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      - "promtail_enabled=true"

  airflow-init:
    <<: *resources-medium
    group_add:
      - "${DOCKER_GID}"
    build:
      context: .
      dockerfile: Dockerfile.airflow
    image: mlops-lab-airflow:slim-3.1.8-python3.11
    container_name: airflow-init
    depends_on:
      postgres-db:
        condition: service_healthy
    environment:
      <<: [*aws-env, *airflow-env, *container-env]
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
      _AIRFLOW_WWW_USER_FIRSTNAME: admin
      _AIRFLOW_WWW_USER_LASTNAME: admin
      _AIRFLOW_WWW_USER_ROLE: Admin
      _AIRFLOW_WWW_USER_EMAIL: admin@local
    volumes: *airflow-volumes
    networks:
      - mlops-lab-net
    command: version
    labels:
      - "promtail_enabled=true"

  airflow-webserver:
    <<: *resources-xlarge
    group_add:
      - "${DOCKER_GID}"
    build:
      context: .
      dockerfile: Dockerfile.airflow
    image: mlops-lab-airflow:slim-3.1.8-python3.11
    container_name: airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      <<: [*aws-env, *airflow-env, *container-env]
      AIRFLOW__API_SERVER__WORKERS: 1
      AIRFLOW__API_SERVER__WEB_SERVER_MASTER_TIMEOUT: 300
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: /opt/airflow/passwords.json
    volumes: *airflow-volumes
    command: api-server
    networks:
      - mlops-lab-net
    env_file:
      - .env
    tmpfs:
      - /tmp:size=512m
    healthcheck:
      test:
        ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      - "promtail_enabled=true"

  airflow-scheduler:
    <<: *resources-large # scheduler needs burst room when triggering DAGs
    group_add:
      - "${DOCKER_GID}"
    build:
      context: .
      dockerfile: Dockerfile.airflow
    image: mlops-lab-airflow:slim-3.1.8-python3.11
    container_name: airflow-scheduler
    hostname: airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      <<: [*aws-env, *airflow-env, *container-env]
      AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "True"
      AIRFLOW__SCHEDULER__PARALLELISM: 1
      AIRFLOW__SCHEDULER__MAX_THREADS: 1
      AIRFLOW__SCHEDULER__PARSING_PROCESSES: 1
      AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: 300
      AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: 300
    volumes: *airflow-volumes
    command: scheduler
    networks:
      - mlops-lab-net
    env_file:
      - .env
    tmpfs:
      - /tmp:size=512m
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --local"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      - "promtail_enabled=true"

  portainer:
    <<: *resources-small # completely idle unless you're actively using the UI
    image: portainer/portainer-ce:2.39.0-alpine
    container_name: portainer
    # 1. docker run --rm httpd:2.4-alpine htpasswd -nbB admin 'superpassword' | cut -d ":" -f 2
    # 2. You need to escape each $ character inside the hashed password with another $
    command: --admin-password '$$2y$$05$$v1jZdrzA6cdaii29.kpMsu1tFC9OHDDF8rj9LeSNRPGeHUcT.WOS.' # superpassword
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - mlops-lab-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:9000/api/system/status || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    labels:
      - "promtail_enabled=true"

  homepage:
    <<: *resources-small # static config renderer, ~30MB baseline
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    ports:
      - "3000:3000"
    volumes:
      - ./config/homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - mlops-lab-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:3000/ || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - "promtail_enabled=true"

  prometheus:
    <<: *resources-medium
    image: prom/prometheus:v3.10.0-busybox
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=1d"
    networks:
      - mlops-lab-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - "promtail_enabled=true"

  grafana:
    <<: *resources-small
    image: grafana/grafana:12.3.5
    container_name: grafana
    depends_on:
      prometheus:
        condition: service_healthy
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ENABLE_GZIP: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/grafana_datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ./config/grafana/grafana_dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - ./config/grafana/dashboards:/opt/grafana/dashboards
    networks:
      - mlops-lab-net
    healthcheck:
      test:
        ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      - "promtail_enabled=true"

  cadvisor:
    <<: *resources-small
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    container_name: cadvisor
    ports:
      - "8085:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    command:
      - "--housekeeping_interval=30s"
      - "--docker_only=true"
    networks:
      - mlops-lab-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    labels:
      - "promtail_enabled=true"

  tempo:
    <<: *resources-small
    image: grafana/tempo:2.7.2
    container_name: tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./config/tempo/tempo.yaml:/etc/tempo.yaml
      - tempo_data:/var/tempo
    ports:
      - "3200:3200" # tempo HTTP API
    networks:
      - mlops-lab-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3200/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    labels:
      - "promtail_enabled=true"

  loki:
    <<: *resources-small
    image: grafana/loki:3.3.2
    container_name: loki
    command: ["-config.file=/etc/loki/loki.yaml"]
    volumes:
      - ./config/loki/loki.yaml:/etc/loki/loki.yaml
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - mlops-lab-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    labels:
      - "promtail_enabled=true"

  promtail:
    <<: *resources-micro
    image: grafana/promtail:3.3.2
    container_name: promtail
    command: ["-config.file=/etc/promtail/promtail.yaml"]
    volumes:
      - ./config/promtail/promtail.yaml:/etc/promtail/promtail.yaml
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/log:/var/log:ro
    networks:
      - mlops-lab-net
    depends_on:
      loki:
        condition: service_healthy
    labels:
      - "promtail_enabled=true"

  otel-collector:
    <<: *resources-micro
    image: otel/opentelemetry-collector:0.110.0
    container_name: otel-collector
    command: ["--config=/etc/otel-config.yaml"]
    volumes:
      - ./config/otel/otel-config.yaml:/etc/otel-config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    networks:
      - mlops-lab-net
    labels:
      - "promtail_enabled=true"

  llamacpp:
    <<: *resources-xlarge
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: llamacpp
    ports:
      - "8000:8080"
    volumes:
      - llama_cache:/root/.cache/llama.cpp
    networks:
      - mlops-lab-net
    command: >
      -hf LiquidAI/LFM2.5-350M-GGUF:Q4_K_M
      -c 4096
      -t 8
      --host 0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_pgdata:
    name: mlops-lab-postgres-data
  portainer_data:
    name: mlops-lab-portainer-data
  uv_cache:
    name: mlops-lab-uv-cache-data
  localstack_data:
    name: mlops-lab-localstack-data
  grafana_data:
    name: mlops-lab-grafana-data
  tempo_data:
    name: mlops-lab-tempo-data
  loki_data:
    name: mlops-lab-loki-data
  prometheus_data:
    name: mlops-lab-prometheus-data
  airflow_logs:
    name: mlops-lab-airflow-logs
  llama_cache:
    name: mlops-lab-llamacpp-cache-data

networks:
  mlops-lab-net:
    driver: bridge
