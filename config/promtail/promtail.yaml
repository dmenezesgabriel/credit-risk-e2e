# config/promtail.yaml

server:
  http_listen_port: 9080
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s

    relabel_configs:
      # 1. Map the Docker label 'promtail_enabled' to an internal label
      - source_labels: [__meta_docker_container_label_promtail_enabled]
        target_label: promtail_enabled

      # 2. THE OPT-IN FILTER: Only keep containers where promtail_enabled is 'true'
      # This automatically ignores your SageMaker steps (which use OTLP direct)
      - source_labels: [promtail_enabled]
        regex: "true"
        action: keep

      # 3. Standard Metadata Mapping (Only runs for containers that pass the 'keep' filter)
      - source_labels: [__meta_docker_container_name]
        regex: "/(.*)"
        target_label: container

      - source_labels:
          [__meta_docker_container_label_com_docker_compose_service]
        target_label: service

      - source_labels:
          [__meta_docker_container_label_com_docker_compose_project]
        target_label: project

    pipeline_stages:
      # Parse Docker's JSON envelope
      - json:
          expressions:
            output: log
            stream: stream

      # Use the parsed log line as the log entry
      - output:
          source: output

      # Promote stream (stdout/stderr) as a label
      - labels:
          stream:

      # Extract log level from the line content
      - match:
          selector: '{container=~".+"}'
          stages:
            - regex:
                expression: "(?i)(?P<level>debug|info|warn(?:ing)?|error|critical|fatal)"
            - labels:
                level:

      # Drop empty / whitespace-only lines
      - drop:
          expression: "^\\s*$"
